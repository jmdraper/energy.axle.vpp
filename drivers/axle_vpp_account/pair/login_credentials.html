<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #1a1a2e;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      background: #000000;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }

    p.subtitle {
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #374151;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: #3B82F6;
    }

    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 6px;
      margin-bottom: 20px;
    }

    .hint a { color: #3B82F6; text-decoration: none; }

    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }

    #btnTest {
      background: #3B82F6;
      color: #fff;
      margin-bottom: 10px;
    }

    #btnTest:hover { opacity: 0.88; }
    #btnTest:disabled { opacity: 0.5; cursor: default; }

    #btnNext {
      background: #10b981;
      color: #fff;
    }

    #btnNext:disabled {
      background: #d1d5db;
      color: #9ca3af;
      cursor: default;
    }

    #status {
      min-height: 22px;
      font-size: 13px;
      text-align: center;
      margin-bottom: 16px;
      border-radius: 6px;
      padding: 4px 0;
    }

    #status.error   { color: #ef4444; }
    #status.success { color: #10b981; }
    #status.info    { color: #6b7280; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960" width="100%" height="100%">
        <g transform="translate(150 165.5) scale(6.6)" fill="#ffffff" stroke="none"><path d="M1.91 0L12.77 0.21L21.28 2.13L29.57 5.74L34.68 8.94L40.43 14.04L45.32 19.79L76.38 64.26L80.21 68.3L85.32 71.49L90.64 72.77L99.36 72.98L100 74.04L100 94.47L99.36 95.32L89.79 95.32L80.85 93.62L72.77 90.43L66.6 86.81L58.72 79.57L54.47 74.47L28.09 36.38L21.06 27.45L16.81 24.47L12.34 22.77L1.28 22.34L0 21.49L0 1.06L1.91 0.21Z"></path><path d="M69.79 0L99.15 0L100 0.85L99.57 21.7L81.91 22.13L74.89 31.28L72.55 35.32L70.64 37.45L69.79 37.45L56.38 18.3L57.66 15.53L67.87 1.28L69.79 0.21Z"></path><path d="M29.15 56.6L35.11 64.04L42.98 75.74L42.13 77.87L29.79 94.89L1.7 95.32L0.43 94.89L0 93.62L0 74.04L1.91 73.19L16.6 72.98L19.79 69.36L27.02 58.51L29.15 56.81Z"></path></g>
      </svg>
    </div>
    <h1>Connect Axle VPP</h1>
    <p class="subtitle">Enter your Axle API token to link your VPP account with Homey.</p>

    <label for="token">API Token</label>
    <input type="password" id="token" placeholder="Paste your API token here" autocomplete="off" />
    <p class="hint">
      Find your token at <a href="#" onclick="return false;">vpp.axle.energy → Account → Integrations</a>
    </p>

    <div id="status" class="info"></div>

    <button id="btnTest" type="button">Test Connection</button>
    <button id="btnNext" type="button" disabled>Next →</button>
  </div>

  <script>
    // Define onHomeyReady immediately so the SDK can call it whenever it fires.
    // Also handle the case where the SDK already ran before this script parsed
    // by checking window.Homey directly.
    function _setupPairView(Homey) {
      const tokenInput = document.getElementById('token');
      const btnTest    = document.getElementById('btnTest');
      const btnNext    = document.getElementById('btnNext');
      const status     = document.getElementById('status');
      let _validatedToken = '';

      function setStatus(msg, type) {
        status.textContent = msg;
        status.className = type || '';
      }

      function setValidated(ok) {
        btnNext.disabled = !ok;
      }

      setStatus('Ready — enter token and test.', 'info');

      tokenInput.addEventListener('input', () => setValidated(false));

      btnTest.addEventListener('click', async () => {
        const token = tokenInput.value.trim();
        if (!token) { setStatus('Please enter your API token.', 'error'); return; }
        btnTest.disabled = true;
        setStatus('Testing connection…', 'info');
        try {
          await Homey.emit('validate', { token });
          _validatedToken = token;
          setStatus('Connection successful!', 'success');
          setValidated(true);
        } catch (err) {
          const msg = (err && err.message) ? err.message : String(err);
          setStatus(msg.includes('UNAUTHORIZED') ? 'Invalid API token.' : 'Connection failed: ' + msg, 'error');
          setValidated(false);
        } finally {
          btnTest.disabled = false;
        }
      });

      btnNext.addEventListener('click', async () => {
        btnNext.disabled = true;
        setStatus('Adding device…', 'info');
        try {
          await Homey.createDevice({
            name: 'Axle VPP',
            data: { id: 'axle_vpp_' + _validatedToken.slice(-8) },
            store: { apiToken: _validatedToken },
          });
          await Homey.done();
        } catch (err) {
          setStatus('Error: ' + (err && err.message ? err.message : String(err)), 'error');
          btnNext.disabled = false;
        }
      });
      tokenInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') btnTest.click(); });

      Homey.ready();
    }

    // Called by the Homey SDK after it injects itself
    function onHomeyReady(Homey) { _setupPairView(Homey); }

    // Fallback: if the SDK already ran before this script (native injection race),
    // window.Homey will already be set — call setup immediately.
    if (window.Homey) { _setupPairView(window.Homey); }
  </script>
</body>
</html>
